name: Build Portable Releases

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.name }} ${{ matrix.acceleration }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform:
              name: linux
              runner: ubuntu-latest
            acceleration: cpu
          - platform:
              name: linux
              runner: ubuntu-latest
            acceleration: cuda
          - platform:
              name: windows
              runner: windows-latest
            acceleration: cpu
          - platform:
              name: windows
              runner: windows-latest
            acceleration: cuda
          - platform:
              name: macos
              runner: macos-latest
            acceleration: cpu

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux desktop dependencies
        if: matrix.platform.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk ffmpeg

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip wheel
          if [ "${{ matrix.acceleration }}" = "cpu" ]; then
            python -m pip install -r requirements-cpu.txt
          else
            python -m pip install -r requirements-cuda.txt
          fi
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-build.txt

      - name: Run tests
        run: |
          python -m pip install -r requirements-dev.txt
          python -m pytest -q

      - name: Build portable app
        run: |
          pyinstaller --clean --noconfirm packaging/AudioStemLab.spec

      - name: Package release artifact
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME:-manual}"
          python scripts/package_release.py --version "$VERSION" --platform "${{ matrix.platform.name }}" --acceleration "${{ matrix.acceleration }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudioStemLab-${{ github.ref_name }}-${{ matrix.platform.name }}-${{ matrix.acceleration }}
          path: release_dist/*.zip

  publish:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/releases/${{ github.ref_name }}.md
          files: release_dist/**/*.zip
